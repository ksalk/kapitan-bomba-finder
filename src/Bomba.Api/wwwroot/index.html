<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomba Finder</title>

    <!-- Open Graph / link preview -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bomba.ksalk.pl/">
    <meta property="og:title" content="Bomba Finder">
    <meta property="og:description" content="Find Kapitan Bomba episodes by quote">
    <meta property="og:image" content="https://bomba.ksalk.pl/bomba.png">

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Bomba Finder">
    <meta name="twitter:description" content="Find Kapitan Bomba episodes by quote">
    <meta name="twitter:image" content="https://bomba.ksalk.pl/bomba.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #2a2a42 0%, #232b4a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #667eea);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .subtitle {
            text-align: center;
            color: #9ca3af;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
            font-size: 1.05em;
        }
        .search-box {
            background: rgba(255, 255, 255, 0.09);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        input[type="text"]::placeholder {
            color: #8b8fa3;
        }
        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.19);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.2);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-container {
            display: none;
            background: rgba(255, 255, 255, 0.09);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            animation: fadeIn 0.5s ease;
        }
        .result-container.visible {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .video-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #fff;
        }
        .similarity {
            background: rgba(102, 126, 234, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #667eea;
        }
        .chunk-text {
            background: rgba(255, 255, 255, 0.07);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            font-style: italic;
            color: #d4d4dc;
            margin-bottom: 20px;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.13);
        }
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.22);
            box-shadow: none;
        }
        .btn-secondary:active:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
        }
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        .error-message.visible {
            display: block;
        }
        .loading {
            text-align: center;
            color: #a0a4b8;
            padding: 40px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            h1 { font-size: 1.8em; }
            .search-box { padding: 18px; }
            .input-group { flex-direction: column; }
            button { padding: 14px 20px; }
            input[type="text"] { padding: 14px 16px; }
            .video-info { flex-direction: column; align-items: flex-start; }
            .chunk-text { padding: 14px; font-size: 0.95em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 5px;">
            <img src="bomba.png" alt="Bomba" style="width: 80px; height: 80px; vertical-align: middle; filter: drop-shadow(0 4px 12px rgba(102, 126, 234, 0.4));">
        </div>
        <h1>Bomba Finder</h1>
        <p class="subtitle">Find Kapitan Bomba episodes by quote</p>
        
        <div class="search-box">
            <div class="input-group">
                <input type="text" id="queryInput" placeholder="Enter a quote to search..." autocomplete="off">
                <button id="searchBtn" onclick="search()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 6px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Searching...</p>
        </div>

        <div id="result" class="result-container">
            <div class="video-wrapper">
                <iframe id="videoFrame" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <div class="video-title" id="videoTitle"></div>
                <!-- <div class="similarity" id="similarity"></div> -->
            </div>
            <div class="chunk-text" id="chunkText"></div>
            <div class="actions">
                <button class="btn-secondary" onclick="openOnYouTube()">Open on YouTube</button>
                <button class="btn-primary" id="shareBtn" onclick="shareSearch()">Share</button>
            </div>
        </div>
    </div>

    <script>
        let currentResult = null;

        document.getElementById('queryInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        async function search() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            history.pushState(null, '', '?query=' + encodeURIComponent(query));
            showLoading(true);
            hideError();
            hideResult();

            try {
                const response = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Search failed');
                }

                currentResult = await response.json();
                showResult(currentResult);
            } catch (err) {
                showError(err.message);
            } finally {
                showLoading(false);
            }
        }

        function showResult(result) {
            document.getElementById('videoFrame').src = result.embedUrl;
            document.getElementById('videoTitle').textContent = result.videoTitle;
            //document.getElementById('similarity').textContent = `Similarity: ${(result.similarityScore * 100).toFixed(1)}%`;
            document.getElementById('chunkText').textContent = `"${result.chunkText}"`;
            document.getElementById('result').classList.add('visible');
        }

        function hideResult() {
            document.getElementById('result').classList.remove('visible');
            document.getElementById('videoFrame').src = '';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('searchBtn').disabled = show;
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('visible');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('visible');
        }

        function openOnYouTube() {
            if (currentResult) {
                window.open(currentResult.videoUrl, '_blank');
            }
        }

        async function shareSearch() {
            const url = window.location.href;
            await navigator.clipboard.writeText(url);
            const btn = document.getElementById('shareBtn');
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = original; }, 2000);
        }

        function newSearch() {
            hideResult();
            document.getElementById('queryInput').value = '';
            document.getElementById('queryInput').focus();
        }

        const _initialQuery = new URLSearchParams(window.location.search).get('query');
        if (_initialQuery) {
            document.getElementById('queryInput').value = _initialQuery;
            search();
        } else {
            document.getElementById('queryInput').focus();
        }
    </script>
</body>
</html>
